# Default values for snowplow (braghettos fork).
#
# Diverges from upstream krateoplatformops/snowplow-chart in the ways
# needed to run the cache-enabled fork at 50K-composition scale:
#   - image points at ghcr.io/braghettos/krateo-snowplow
#   - resources pre-sized for informer + in-process cache + GC headroom
#   - env carries GOMEMLIMIT/GOGC for cgroup-aware GC
#   - volumes mount the external snowplow-cache-warmup ConfigMap
#   - envFrom picks up the external snowplow-api-override ConfigMap
#     (managed by the portal blueprint) in addition to the chart's
#     own snowplow ConfigMap
#   - Redis sidecar removed (v0.25.266+): cache is in-process MemCache
#   - probes split onto a dedicated PROBE_PORT (Q-PREWARM-R2 §1.3,
#     v0.25.293+): isolates /health and /ready from the main request
#     mux so kubelet probes never starve under prewarm CPU pressure

replicaCount: 1

# Q-PREWARM-R2 (v0.25.293+): /ready now flips on informer-sync only,
# typically <= 30s after pod start regardless of L1 prewarm progress.
# The 1200s window remains as a safety net for cold first-LIST at
# 50K compositions (informer initial LIST/WATCH can still take ~5
# minutes under heavy API server load); it is no longer the dominant
# factor.
progressDeadlineSeconds: 1200

image:
  repository: ghcr.io/braghettos/krateo-snowplow
  pullPolicy: Always
  # Empty -> defaults to the chart appVersion (= APP_VERSION = latest semver tag of the
  # braghettos/snowplow app repo, resolved by release-oci). The app fork builds multi-arch
  # (amd64+arm64) images tagged with that same app version, so the chart always deploys the
  # image the app actually published. Override here only to pin a specific tag.
  #
  # NOTE: the deployed image MUST be >= 0.25.293 -- earlier images do NOT honour PROBE_PORT
  # and will silently leave port 8082 closed, turning every kubelet probe into a
  # connection-refused -> restart. The current app stream (1.0.x) is well past that.
  tag: ""

imagePullSecrets: []
nameOverride: "snowplow"
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: LoadBalancer
  port: 8081

# Q-PREWARM-R2 1.3 -- dedicated kubelet-probe port.
#
# When > 0 the snowplow binary opens a SECOND http.Server bound to
# this port. That server has its own mux, its own goroutine, and
# NO middleware (no otelhttp, no CORS, no recovery, no gzip). The
# main :8081 server still serves /health and /ready as well, but
# the kubelet's livenessProbe and readinessProbe are pointed at
# this dedicated port so probes are NEVER blocked by request-side
# pressure on the main accept loop or middleware chain.
#
# Set to 0 to disable the probe-only listener and fall back to
# pre-R2 behaviour (kubelet hits :8081). Used for emergency
# rollback without changing image tags.
probePort: 8082

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# Right-sized from stress test data (50K compositions x 1000 users):
#   Peak heap:   3.9 GB (cold start with 1000 users)
#   Steady heap: 3.3 GB
#   In-process cache: ~2-3 GB (L1 resolved entries, replaces Redis)
#   Peak RSS:    ~6 GB total
#
# Memory tuning history:
#   - Original 20 Gi: unchunked informer LIST at 50K (~15 GB spike).
#   - 12 Gi: with chunked LIST (Limit=500) + informer.SetTransform
#     stripping managedFields/last-applied -- peak RSS ~6 GB.
#   - 8 Gi target (this revision): contingent on GOMEMLIMIT being set
#     BELOW the container limit so the Go runtime backpressures via
#     aggressive GC before Linux OOM-kills the pod. The earlier 8 Gi
#     attempts OOMed because GOMEMLIMIT was set >= container limit and
#     the runtime never saw memory pressure. Validate at 50K under
#     Phase-6 load before treating this as the new baseline.
resources:
  limits:
    cpu: 4
    memory: 8Gi
  requests:
    cpu: 2
    memory: 4Gi

# Q-PREWARM-R2 (v0.25.293+) probe configuration.
#
# All three probes target the dedicated `probe` port (PROBE_PORT,
# default 8082) instead of the main `http` port. The dedicated
# server has 1s read/write timeouts, no middleware, and is on its
# own goroutine -- so probes return in sub-millisecond steady state.
#
# The timeouts/thresholds below are EXPLICIT (not k8s defaults)
# because the pre-R2 behaviour relied on k8s defaults
# (timeoutSeconds: 1, failureThreshold: 3, periodSeconds: 10) which
# left only a 30-second window before kubelet killed the pod. With
# R2's probe isolation 1s is plenty for /health (it is a 5-byte
# write), but we relax failureThreshold to 5 and timeoutSeconds to
# 3 as defence-in-depth: even if the OS scheduler hiccups, a
# transient miss should not restart the pod.

# Startup probe: gives the binary up to 6 minutes to reach the
# point where the dedicated probe server is listening. In practice
# it binds within ~50ms of process start (before the slow
# informer-sync work runs in a background goroutine), so this is
# almost entirely headroom for image pull / kube-scheduler latency.
startupProbe:
  httpGet:
    path: /health
    port: probe
  failureThreshold: 36
  periodSeconds: 10
  timeoutSeconds: 3

# Liveness probe: liveness only checks that the binary is alive
# (Q-PREWARM-R2.2 -- /health is now a pure 5-byte write with zero
# kube-API touches). failureThreshold: 5 + periodSeconds: 10 +
# timeoutSeconds: 3 gives a 50-second window before kubelet
# decides to restart, vs the 30-second window of k8s defaults that
# triggered the death-spiral.
livenessProbe:
  httpGet:
    path: /health
    port: probe
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 5

# Readiness probe: Q-PREWARM-R2.1 -- /ready now flips to 200 once
# informers complete their initial LIST/WATCH sync (~10-30s at
# 50K), independent of the multi-minute L1 prewarm loop. Pod
# becomes Ready as soon as it can serve cold-L1 traffic; misses
# fall through to the foreground singleflight resolve.
readinessProbe:
  httpGet:
    path: /ready
    port: probe
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

# Command-line args for the snowplow container. Empty by default
# (the binary reads all config from env). Kept here for parity with
# older deployments that passed --l1-disk-path=... etc.
args: []

# Additional volumes beyond the chart-managed jq-modules ConfigMap.
volumes:
  # External ConfigMap containing cache-warmup.yaml (owned by the
  # portal blueprint or applied via kubectl). Mounted read-only at
  # /etc/snowplow.
  - name: cache-warmup-config
    configMap:
      name: snowplow-cache-warmup
      defaultMode: 420
      # Optional: cache warmup is a startup optimization. When the blueprint/portal
      # has not provided this ConfigMap, the pod must still start (WarmL1 simply
      # skips). Without this, the pod is stuck ContainerCreating on FailedMount.
      optional: true
  # Frontend config.json from the portal's frontend-config-vars ConfigMap.
  # Used by WarmL1FromEntryPoints to discover INIT/ROUTES_LOADER entry
  # points for targeted L1 warmup. Optional so pods start cleanly when
  # the ConfigMap does not exist yet.
  - name: frontend-config
    configMap:
      name: frontend-config-vars
      optional: true

volumeMounts:
  - name: cache-warmup-config
    mountPath: /etc/snowplow
    readOnly: true
  - name: frontend-config
    mountPath: /etc/frontend-config
    readOnly: true

# Extra envFrom entries appended to the default (chart-managed
# ConfigMap + jwt-sign-key Secret). Used to pick up ConfigMaps owned
# by other components without re-templating them here.
extraEnvFrom:
  - configMapRef:
      name: snowplow-api-override
      optional: true

# Redis sidecar removed -- snowplow uses in-process MemCache (v0.25.266+).
initContainers: []

nodeSelector: {}
tolerations: []
affinity: {}

# Env vars rendered into the chart's snowplow ConfigMap and consumed
# via envFrom. Any value that should reach the snowplow process goes
# here -- the container itself has no direct `env:` array.
env:
  DEBUG: "false"
  BLIZZARD: "false"
  SKIP: "false"
  JQ_MODULES_PATH: /jq-modules
  # Go runtime: trigger proactive GC at 6 GiB so we stay under the
  # 8 Gi cgroup limit. Stress test peak was 3.9 GB at 1000 users;
  # 6 GiB leaves 2 GiB headroom for transient spikes.
  # Must be BELOW the container memory limit (8 Gi) so the Go runtime
  # backpressures via GC before Linux OOM-kills the pod. Setting this
  # at or above the container limit is a misconfiguration that has
  # caused OOM-kill incidents.
  GOMEMLIMIT: 7GiB
  # Lower GOGC (default 100) trades ~1% CPU for tighter memory headroom.
  GOGC: "50"
  CACHE_ENABLED: "true"
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: krateo-clickstack-otel-collector.clickhouse-system:4317
  OTEL_SERVICE_NAME: snowplow
  # Q-PREWARM-R2 1.3 -- PROBE_PORT is rendered into the chart's
  # snowplow ConfigMap by templates/configmap.yaml (NOT here) so
  # there is exactly one source of truth: .Values.probePort.
  # Q-PREWARM-R2R5 PR-B (R5) -- event-driven prewarm via the
  # UserSecretWatcher informer. PREWARM_MODE selects between:
  #   "event-driven" (default): bounded worker pool consumes ADD
  #     events from -clientconfig Secrets and walks the widget
  #     tree per user concurrently. PREWARM_WORKERS controls
  #     parallelism; PREWARM_QUEUE bounds the in-flight backlog.
  #   "legacy": preserves the synchronous WarmL1FromEntryPoints
  #     binding-group loop. Use as a rollback lever via
  #     `helm upgrade --reuse-values --set env.PREWARM_MODE=legacy`.
  # K=4 is the conservative default for the current 2-CPU pod
  # spec; tune via cache-tester K-sweep (spec §3) once the cluster
  # is calm and re-deployable.
  PREWARM_MODE: "event-driven"
  PREWARM_WORKERS: "4"
  PREWARM_QUEUE: "2048"

jwtSignKeySecretName: jwt-sign-key
