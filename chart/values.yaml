# Default values for snowplow (braghettos fork — clean-slate-0.30.0).
#
# This is the chart re-grown to 0.30.4 (cache=on activation tag).
# Original clean-slate-0.30.0 baseline stripped every value the
# upstream 0.20.5 binary could not consume; re-grow notes below.
#
# Originally stripped at clean-slate-0.30.0 (0.20.5-binary baseline):
#   - probePort 8082 + isolated probe server (R2 listener does not
#     exist at 0.20.5; probes target the main `http` port)
#   - cache-warmup-config volume (cache subsystem absent at 0.20.5)
#   - frontend-config volume (entry-point prewarm absent at 0.20.5)
#   - snowplow-api-override extraEnvFrom (config carrier removed)
#   - CACHE_ENABLED env (cache subsystem absent at 0.20.5; re-added at
#     0.30.4 with default "true" — cache=on activation per Revision 1)
#   - PREWARM_MODE/PREWARM_WORKERS/PREWARM_QUEUE env (prewarm absent)
#   - OTEL_* env (OpenTelemetry absent at 0.20.5)
#
# Re-grow tag-by-tag per the canonical roadmap in snowplow/docs/
# implementation-plan-detailed.md. At 0.30.4 the cache subsystem is
# activated (CACHE_ENABLED=true); the toggle is preserved so override
# --set env.CACHE_ENABLED=false at install/upgrade time restores the
# 0.30.3 (cache=off) behaviour for parity measurements.

replicaCount: 1

progressDeadlineSeconds: 600

# Explicit Deployment update strategy. With replicaCount:1 and no
# strategy block, Kubernetes defaults to RollingUpdate with
# maxUnavailable:25% which rounds UP to 1 at a single replica — the old
# pod is killed BEFORE the new pod is Ready, so every deploy has a
# downtime window. maxUnavailable:0 + maxSurge:1 keeps the old pod
# serving until the new pod passes its readiness probe → zero-downtime
# rollout. (Critical once readiness gates on a multi-minute prewarm.)
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

image:
  repository: ghcr.io/braghettos/snowplow
  pullPolicy: Always
  # tag is intentionally unset — deployment.yaml resolves it via
  #   .Values.image.tag | default .Chart.AppVersion
  # and under the lockstep convention .Chart.AppVersion is the release
  # semver (release-tag.yaml substitutes APP_VERSION from the tag). An
  # explicit override is still possible via --set image.tag=<x>.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: LoadBalancer
  port: 8081

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# Memory budget — Ship 0.30.122 R4 Lever 4: limit raised 16Gi -> 24Gi.
# 0.30.121 enabled PREWARM_ENABLED=true, which moved the dynamic
# informer's initial relist of the 48,999-composition fixture into pod
# startup; the un-bounded relist transient peaked at ~17.7 GiB and
# OOMKilled the pod 4x against the 16Gi limit. R4 Lever 1 (the streaming
# ListWatch) bounds that transient, but the 24Gi limit is the PM-authorized
# interim headroom bump that converges with the permanent right-size —
# the final number is bench-derived (the tester refines it from the
# post-fix steady-state RSS). request == limit so the scheduler reserves
# the full footprint and the pod is not a memory-pressure eviction
# target. (CPU stays request 500m / limit 2 — QoS is Burstable; CPU is
# not the constrained resource here.)
resources:
  limits:
    cpu: 2
    memory: 24Gi
  requests:
    cpu: 500m
    memory: 24Gi

# Probes target the main `http` listener.
#
# 0.30.102 Tag B — probe-gated readiness. The snowplow binary now
# exposes a dedicated /readyz endpoint distinct from /health:
#   - /health  : liveness-only (process alive). A still-warming pod is
#                alive and must NOT be restarted — livenessProbe stays
#                on /health.
#   - /readyz  : readiness. Returns 200 only once the Tag B Phase 1
#                startup informer-warmup has completed (Phase1Done);
#                503 while warming. readinessProbe + startupProbe target
#                /readyz so traffic is withheld until the navigated
#                informers are warm.
#
# Behavior-neutral default: with PREWARM_ENABLED unset (the chart does
# NOT set it — absent => OFF) the binary flips Phase1Done immediately at
# startup, so /readyz returns 200 from the first probe — the gate is a
# no-op until the cold-vs-warm bench opts in via PREWARM_ENABLED=true.
#
# startupProbe budget: failureThreshold * periodSeconds = 90 * 10 = 900s
# — the Phase 1 SA-credentialed resolution walk + the all-informer sync
# barrier may take several minutes at production scale; the pod must not
# be killed mid-warmup.
startupProbe:
  httpGet:
    path: /readyz
    port: http
  failureThreshold: 90
  periodSeconds: 10
  timeoutSeconds: 3

livenessProbe:
  httpGet:
    path: /health
    port: http
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 5

readinessProbe:
  httpGet:
    # 0.30.102 Tag B: the binary now exposes a dedicated /readyz probe
    # endpoint (200 once Phase1Done; 503 while warming). With
    # PREWARM_ENABLED OFF (chart default) /readyz returns 200 from the
    # first probe — behavior-neutral.
    path: /readyz
    port: http
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

# Command-line args for the snowplow container. Empty by default
# (the binary reads all config from env).
args: []

# No extra volumes at 0.20.5 — chart manages only the jq-modules ConfigMap.
volumes: []
volumeMounts: []

# No extra envFrom at 0.20.5.
extraEnvFrom: []

# No init containers — Redis sidecar removal predates this baseline
# but the field is preserved for chart-shape compatibility.
initContainers: []

nodeSelector: {}
tolerations: []
affinity: {}

# Env vars rendered into the chart's snowplow ConfigMap and consumed
# via envFrom. Only knobs the 0.20.5 binary actually reads.
env:
  DEBUG: "false"
  BLIZZARD: "false"
  SKIP: "false"
  JQ_MODULES_PATH: /jq-modules
  # Cache subsystem activation (0.30.4 Revision 1 binding).
  # CACHE_ENABLED=true wires:
  #   - the dynamic informer factory (Role/RoleBinding/ClusterRole/
  #     ClusterRoleBinding eagerly registered);
  #   - in-process EvaluateRBAC for every RestAction/Widget dispatch;
  #   - zero SubjectAccessReview calls to apiserver (Revision 1 ROLLBACK trigger).
  # Override at install/upgrade time with --set env.CACHE_ENABLED=false to
  # fall back to the 0.30.3 (cache=off) behaviour.
  CACHE_ENABLED: "true"
  # Resolver pivot (0.30.95): resolver inner-call K8s GETs/LISTs are
  # served from the in-process informer cache instead of apiserver
  # round-trips. Default ON per Diego 2026-05-15 — banks the apiserver
  # load reduction + inner-call latency win (measured 10.4s -> 3.0s on
  # compositions-panels at 50K). Escape hatch: --set
  # env.RESOLVER_USE_INFORMER=false reverts to the 0.30.94 apiserver
  # path. Known follow-up: cold pod restart triggers an informer-sync
  # warm-up window; prewarm is a tracked fast-follow.
  RESOLVER_USE_INFORMER: "true"
  # Phase 1 navigation-root source (0.30.107). Phase 1's startup walk
  # reads the navigation entry points from the frontend ConfigMap's
  # `config.json` (.api.INIT / .api.ROUTES_LOADER) instead of hardcoding
  # the navmenus/routesloaders GVRs — the ConfigMap IS the navigation
  # contract. FRONTEND_CONFIG_CONFIGMAP names that ConfigMap; its
  # namespace is AUTHN_NAMESPACE (snowplow's control-plane namespace).
  # An unset/empty value falls back to the default "frontend-config-vars".
  # Only consumed when PREWARM_ENABLED=true.
  FRONTEND_CONFIG_CONFIGMAP: "frontend-config-vars"
  # Ship 0.30.121 R2-a — enable Phase-1 prewarm. With prewarm OFF no
  # informer is warmed before the first request, so the resolver pivot's
  # Gate 6 (informer registered + synced) falls through to a second
  # apiserver LIST — the ~5.81 GiB transient-memory line on the 50K
  # bench. PREWARM_ENABLED=true runs the Phase-1 SA-credentialed
  # navigation walk at startup so the composition GVR's informer is
  # synced before traffic arrives and Gate 6 serves from cache. The pod
  # now takes ~67s to become Ready (Phase-1 warmup) — well within the
  # 900s startupProbe budget.
  PREWARM_ENABLED: "true"
  # Ship 0.30.121 R1-b — operator kill-switch for the httpcall verbose
  # wire-dump (DumpResponse). When false (default) endpoint.Debug is
  # never set regardless of a per-RESTAction krateo.io/verbose annotation
  # — so a stray annotation on a heavy RESTAction cannot OOM the pod. The
  # verbose wire-dump stringifies entire HTTP response bodies (the
  # multi-MB compositions LIST) — ~1.94 GiB alloc_space on the 50K bench.
  RESOLVER_VERBOSE_WIRE_DUMP: "false"
  # Ship 0.30.121 R2-b — bounded single-attempt informer sync-wait at the
  # resolver-pivot Gate 6. Default 0 = disabled = pre-0.30.121 behaviour
  # (an unsynced GVR falls straight through to the apiserver). When set
  # positive, a Gate-6 miss does ONE channel-select wait, hard-capped at
  # this many milliseconds, on the GVR's informer sync channel, then
  # re-checks servability — a now-synced informer serves from cache
  # instead of a second apiserver LIST. Default-off scaffolding.
  RESOLVER_SYNC_WAIT_MS: "0"
  # Ship 0.30.122 R4 Lever 1 — streaming ListWatch for the composition
  # GVR's dynamic informer. Default ON: the informer's initial relist
  # streams the paged LIST response body item-by-item through a
  # json.Decoder (strip applied inline, pre-transform object freed before
  # the next element) instead of materialising the whole 48,999-object
  # pre-transform set — the ~17.7 GiB relist transient that OOMKilled
  # 0.30.121 under PREWARM_ENABLED=true. Set "false" to revert the
  # composition GVR to the standard NewFilteredDynamicInformer (AC-7).
  RESOLVER_COMPOSITION_STREAMING_LIST: "true"
  # Ship 0.30.122 R4 Lever 3 — Go runtime soft memory ceiling. GOMEMLIMIT
  # makes the Go GC run more aggressively as the heap approaches this
  # limit, so transient allocation spikes are reclaimed before the cgroup
  # hard limit (24Gi) triggers an OOMKill. Set ~11-12 GiB — above the
  # post-fix steady-state informer-cache floor with margin, well under
  # the 24Gi pod limit. Provisional: the tester refines the final value
  # from the post-fix bench (it must sit above the steady-state floor).
  GOMEMLIMIT: "11GiB"
  # Ship 0.30.123 (#155) — in-process nested /call resolution. When a
  # RESTAction stage's path is a /call?resource=... loopback into
  # snowplow's own /call endpoint, the resolver resolves the referenced
  # RESTAction IN-PROCESS (no HTTP request, no Authorization header,
  # identity carried on the context) instead of issuing an HTTP loopback.
  # This lets a JWT-less / SA-credentialed resolve complete an exportJwt
  # loopback stage (the 0.30.120 poison) and is the hard prerequisite for
  # F2's startup SA-prewarm. Default ON. Set "false" and every /call
  # stage takes the HTTP path, byte-identical to 0.30.121.
  RESOLVER_INPROCESS_NESTED_CALL: "true"
  # Ship 0.30.125 (F2) — the SA-driven content-population pass. When
  # enabled, a new Phase-1 Step 7.5 (after the informer sync barrier,
  # before /readyz flips to 200) resolves the navigation's data-source
  # RESTActions under the snowplow ServiceAccount and warms F1's
  # identity-free content L1 — so the first real /call by any never-seen
  # user is a content hit with zero resolve and cold navigations vanish.
  # Chart default FALSE: the production default is decided by F2's 50K
  # MaxRSS bench (FAL-4), not pre-set. The validation deploy sets it true
  # via --set. Flag-off, Phase-1 startup is byte-identical to 0.30.124.
  PREWARM_CONTENT_ENABLED: "false"
  # Ship 0.30.125 (F2) — per-envelope circuit-breaker for the content
  # pass. A prewarmed RESTAction whose resolved envelope exceeds this
  # many bytes is logged (content.prewarm.envelope_oversize) so the
  # threshold can be tuned. ~32 MiB admits compositions-list's ~26 MB
  # 50K-scale envelope while still flagging a pathologically large one.
  PREWARM_CONTENT_MAX_BYTES: "33554432"
  # Ship 0.30.127 — bounded per-widget pagination default for the Phase-1
  # discovery walk. A navigation widget whose resolved /call child Path
  # declares no page/perPage `slice` is resolved under this page limit;
  # a widget that DOES declare a slice overrides it. It is never -1 — -1
  # is the unbounded value that, with phase1IteratorCap removed, would
  # drive the 49K-row resolution storm. The walk only needs to traverse
  # navigation STRUCTURE and discover (GVR-scoped) informers, so a small
  # default suffices.
  PREWARM_PAGE_LIMIT: "5"

jwtSignKeySecretName: jwt-sign-key
