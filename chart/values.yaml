# Default values for snowplow (braghettos fork).
#
# Diverges from upstream krateoplatformops/snowplow-chart in the ways
# needed to run the cache-enabled fork at 50K-composition scale:
#   - image points at ghcr.io/braghettos/snowplow
#   - resources pre-sized for informer + redis + GC headroom
#   - env carries GOMEMLIMIT/GOGC for cgroup-aware GC
#   - volumes mount the external snowplow-cache-warmup ConfigMap
#     and the L1 disk emptyDir
#   - envFrom picks up the external snowplow-api-override ConfigMap
#     (managed by the portal blueprint) in addition to the chart's
#     own snowplow ConfigMap
#   - a redis initContainer runs as a sidecar so snowplow can talk
#     to localhost:6379 without a separate release

replicaCount: 1

# At 49K compositions the readiness probe (/ready, gated on prewarm
# completion) takes ~11 min to pass. Default 600s causes k8s to mark
# the deployment condition as ProgressDeadlineExceeded (cosmetic —
# rollout still completes, but helm reports a false error).
progressDeadlineSeconds: 1200

image:
  repository: ghcr.io/braghettos/snowplow
  pullPolicy: Always
  # Pinned explicitly so the image build is decoupled from chart
  # versioning. The chart's Chart.yaml appVersion placeholder is
  # substituted by CI with the chart git tag, which is NOT the same
  # as the snowplow app version. Always bump this in a values commit
  # when you want a new snowplow app build to roll out.
  tag: "0.25.179"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: LoadBalancer
  port: 8081

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# At 50K compositions the informer cache holds ~11 GB of decoded
# unstructured.Unstructured objects plus ~2-3 GB transient JSON decode
# buffer from the watch stream. GOMEMLIMIT=18GiB keeps the Go runtime
# cgroup-aware so GC fires before we breach 20 Gi and get OOMKilled.
resources:
  limits:
    cpu: 4
    memory: 20Gi
  requests:
    cpu: 2
    memory: 10Gi

# Startup probe: k8s does not check liveness/readiness until startup
# succeeds. At 49K compositions the informer warmup can take 5-10 min,
# so we allow up to 360s (36 × 10s) before declaring the pod failed.
startupProbe:
  httpGet:
    path: /health
    port: http
  failureThreshold: 36
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /health
    port: http
# /ready returns 503 until IsPreWarmComplete() is true, which is set
# AFTER Phase 4b (RBAC warmup for all users) + Phase 5 (L1 warmup).
# This ensures no traffic reaches the pod before the RBAC cache is
# populated — the RBAC gate on L3 reads (api/resolve.go) depends on
# a warm RBAC cache for correctness.
readinessProbe:
  httpGet:
    path: /ready
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

# Command-line args for the snowplow container. Empty by default
# (the binary reads all config from env). Kept here for parity with
# older deployments that passed --l1-disk-path=... etc.
args: []

# Additional volumes beyond the chart-managed jq-modules ConfigMap.
volumes:
  # External ConfigMap containing cache-warmup.yaml (owned by the
  # portal blueprint or applied via kubectl). Mounted read-only at
  # /etc/snowplow.
  - name: cache-warmup-config
    configMap:
      name: snowplow-cache-warmup
      defaultMode: 420

volumeMounts:
  - name: cache-warmup-config
    mountPath: /etc/snowplow
    readOnly: true

# Extra envFrom entries appended to the default (chart-managed
# ConfigMap + jwt-sign-key Secret). Used to pick up ConfigMaps owned
# by other components without re-templating them here.
extraEnvFrom:
  - configMapRef:
      name: snowplow-api-override
      optional: true

# Sidecar init container running redis for the snowplow cache.
# `restartPolicy: Always` makes k8s keep it running alongside the
# main container (k8s 1.28+ sidecar pattern).
initContainers:
  - name: redis
    image: redis:8.6.2-alpine
    imagePullPolicy: IfNotPresent
    restartPolicy: Always
    ports:
      - containerPort: 6379
        protocol: TCP
    readinessProbe:
      exec:
        command: [redis-cli, ping]
      initialDelaySeconds: 2
      periodSeconds: 3
      timeoutSeconds: 1
      successThreshold: 1
      failureThreshold: 3
    env:
      - name: CACHE_ENABLED
        value: "true"
      - name: DEBUG
        value: "false"

nodeSelector: {}
tolerations: []
affinity: {}

# Env vars rendered into the chart's snowplow ConfigMap and consumed
# via envFrom. Any value that should reach the snowplow process goes
# here — the container itself has no direct `env:` array.
env:
  DEBUG: "false"
  BLIZZARD: "false"
  SKIP: "false"
  JQ_MODULES_PATH: /jq-modules
  # Go runtime: trigger proactive GC at 18 GiB so we stay under the
  # 20 Gi cgroup limit even with transient watch-stream decode spikes.
  GOMEMLIMIT: 18GiB
  # Lower GOGC (default 100) trades ~1% CPU for tighter memory headroom.
  GOGC: "50"
  CACHE_ENABLED: "true"
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: krateo-clickstack-otel-collector.clickhouse-system:4317
  OTEL_SERVICE_NAME: snowplow

jwtSignKeySecretName: jwt-sign-key
